<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSG Benchmark Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --hugo: #FF4088;
    --zola: #2B7489;
    --jekyll: #CC0000;
    --hwaro: #4A90D9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* Header */
  header { text-align: center; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 2rem; margin-bottom: 8px; }
  header p { color: var(--text-muted); font-size: 0.9rem; }
  header a { color: var(--text-muted); text-decoration: none; }
  header a:hover { color: var(--text); }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 4px solid; }
  .card h3 { font-size: 1.1rem; margin-bottom: 4px; }
  .card .lang { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; }
  .card .desc { color: var(--text-muted); font-size: 0.85rem; }
  .card .stat { font-size: 1.4rem; font-weight: 700; margin-top: 8px; }
  .card .stat small { font-size: 0.7rem; color: var(--text-muted); font-weight: 400; }

  /* Chart sections */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 24px; }
  .section h2 { font-size: 1.2rem; margin-bottom: 16px; }
  .section .controls { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .section .controls button { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
  .section .controls button:hover { border-color: var(--text-muted); }
  .section .controls button.active { background: var(--border); color: var(--text); border-color: var(--text-muted); }
  .chart-wrapper { position: relative; height: 400px; }

  /* Bar charts grid */
  .bar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; }
  .bar-grid .chart-wrapper { height: 300px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--text-muted); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  th .sort-icon { font-size: 0.7rem; margin-left: 4px; }
  td { font-variant-numeric: tabular-nums; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .ssg-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  @media (max-width: 600px) {
    .bar-grid { grid-template-columns: 1fr; }
    .chart-wrapper { height: 300px; }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SSG Build Performance Benchmark</h1>
    <p id="updated"></p>
    <p><a href="https://github.com/hahwul/ssg-benchmark" target="_blank">GitHub Repository</a></p>
  </header>

  <!-- SSG Overview Cards -->
  <div class="cards" id="ssg-cards"></div>

  <!-- Build Scaling Chart -->
  <div class="section">
    <h2>Build Scaling Performance</h2>
    <div class="chart-wrapper"><canvas id="scalingChart"></canvas></div>
  </div>

  <!-- Per-Page-Count Bar Charts -->
  <div class="section">
    <h2>Build Time by Page Count</h2>
    <div class="bar-grid" id="barCharts"></div>
  </div>

  <!-- Historical Trends -->
  <div class="section">
    <h2>Historical Trends</h2>
    <div class="controls" id="trendControls"></div>
    <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
  </div>

  <!-- Data Table -->
  <div class="section">
    <h2>All Results</h2>
    <div style="overflow-x:auto">
      <table id="resultsTable">
        <thead><tr>
          <th data-col="run">Run</th>
          <th data-col="ssg">SSG</th>
          <th data-col="page_count">Pages</th>
          <th data-col="avg_time_ms">Avg (ms)</th>
          <th data-col="min_time_ms">Min (ms)</th>
          <th data-col="max_time_ms">Max (ms)</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SSG_META = {
  hugo:   { color: '#FF4088', lang: 'Go',     desc: 'The world\'s fastest framework for building websites' },
  zola:   { color: '#2B7489', lang: 'Rust',   desc: 'A fast static site generator in a single binary' },
  jekyll: { color: '#CC0000', lang: 'Ruby',   desc: 'Transform your plain text into static websites and blogs' },
  hwaro:  { color: '#4A90D9', lang: 'Rust',   desc: 'A lightweight static site generator' }
};

let DATA = null;
let trendChart = null;
let selectedPageCount = null;

async function init() {
  const resp = await fetch('data.json');
  DATA = await resp.json();

  document.getElementById('updated').textContent = 'Last updated: ' + new Date(DATA.generated).toLocaleString();

  renderCards();
  renderScalingChart();
  renderBarCharts();
  renderTrendControls();
  renderTrendChart();
  renderTable();
}

function latestRun() {
  return DATA.runs[DATA.runs.length - 1];
}

function getSSGs() {
  const ssgs = new Set();
  DATA.runs.forEach(r => r.results.forEach(d => ssgs.add(d.ssg)));
  return [...ssgs].sort();
}

function getPageCounts() {
  const pcs = new Set();
  DATA.runs.forEach(r => r.results.forEach(d => pcs.add(d.page_count)));
  return [...pcs].sort((a, b) => a - b);
}

function formatMs(ms) {
  if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
  return ms + 'ms';
}

/* SSG Overview Cards */
function renderCards() {
  const run = latestRun();
  const container = document.getElementById('ssg-cards');
  const ssgs = getSSGs();

  ssgs.forEach(ssg => {
    const meta = SSG_META[ssg] || { color: '#888', lang: '?', desc: '' };
    // Get time at max page count for this SSG
    const maxPc = Math.max(...run.results.filter(r => r.ssg === ssg).map(r => r.page_count));
    const entry = run.results.find(r => r.ssg === ssg && r.page_count === maxPc);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = meta.color;
    card.innerHTML = `
      <h3 style="color:${meta.color}">${ssg.charAt(0).toUpperCase() + ssg.slice(1)}</h3>
      <div class="lang">${meta.lang}</div>
      <div class="desc">${meta.desc}</div>
      ${entry ? `<div class="stat" style="color:${meta.color}">${formatMs(entry.avg_time_ms)} <small>@ ${maxPc.toLocaleString()} pages</small></div>` : ''}
    `;
    container.appendChild(card);
  });
}

/* Build Scaling Chart (Line) */
function renderScalingChart() {
  const run = latestRun();
  const ssgs = getSSGs();
  const pageCounts = getPageCounts();

  const datasets = ssgs.map(ssg => {
    const meta = SSG_META[ssg] || { color: '#888' };
    const data = pageCounts.map(pc => {
      const entry = run.results.find(r => r.ssg === ssg && r.page_count === pc);
      return entry ? entry.avg_time_ms : null;
    });
    return {
      label: ssg.charAt(0).toUpperCase() + ssg.slice(1),
      data,
      borderColor: meta.color,
      backgroundColor: meta.color + '20',
      tension: 0.3,
      pointRadius: 5,
      pointHoverRadius: 7,
      fill: false
    };
  });

  new Chart(document.getElementById('scalingChart'), {
    type: 'line',
    data: { labels: pageCounts.map(pc => pc.toLocaleString() + ' pages'), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${formatMs(ctx.raw)}`
          }
        }
      },
      scales: {
        y: {
          title: { display: true, text: 'Build Time (ms)', color: '#8b949e' },
          ticks: { color: '#8b949e' },
          grid: { color: '#21262d' }
        },
        x: {
          ticks: { color: '#8b949e' },
          grid: { color: '#21262d' }
        }
      }
    }
  });
}

/* Per-Page-Count Bar Charts */
function renderBarCharts() {
  const run = latestRun();
  const ssgs = getSSGs();
  const pageCounts = getPageCounts();
  const container = document.getElementById('barCharts');

  pageCounts.forEach(pc => {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `<h3 style="color:var(--text-muted);font-size:0.9rem;margin-bottom:8px">${pc.toLocaleString()} Pages</h3><div class="chart-wrapper"><canvas></canvas></div>`;
    container.appendChild(wrapper);

    const canvas = wrapper.querySelector('canvas');
    const data = ssgs.map(ssg => {
      const entry = run.results.find(r => r.ssg === ssg && r.page_count === pc);
      return entry ? entry.avg_time_ms : 0;
    });
    const colors = ssgs.map(s => (SSG_META[s] || { color: '#888' }).color);

    new Chart(canvas, {
      type: 'bar',
      data: {
        labels: ssgs.map(s => s.charAt(0).toUpperCase() + s.slice(1)),
        datasets: [{
          data,
          backgroundColor: colors.map(c => c + 'CC'),
          borderColor: colors,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => formatMs(ctx.raw) } }
        },
        scales: {
          y: {
            title: { display: true, text: 'ms', color: '#8b949e' },
            ticks: { color: '#8b949e' },
            grid: { color: '#21262d' }
          },
          x: {
            ticks: { color: '#8b949e' },
            grid: { display: false }
          }
        }
      }
    });
  });
}

/* Historical Trends */
function renderTrendControls() {
  const pageCounts = getPageCounts();
  const container = document.getElementById('trendControls');
  selectedPageCount = pageCounts[pageCounts.length - 1]; // default to max

  pageCounts.forEach(pc => {
    const btn = document.createElement('button');
    btn.textContent = pc.toLocaleString() + ' pages';
    btn.className = pc === selectedPageCount ? 'active' : '';
    btn.addEventListener('click', () => {
      selectedPageCount = pc;
      container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTrendChart();
    });
    container.appendChild(btn);
  });
}

function renderTrendChart() {
  const ssgs = getSSGs();
  const runs = DATA.runs;

  const labels = runs.map(r => r.date);
  const datasets = ssgs.map(ssg => {
    const meta = SSG_META[ssg] || { color: '#888' };
    const data = runs.map(r => {
      const entry = r.results.find(d => d.ssg === ssg && d.page_count === selectedPageCount);
      return entry ? entry.avg_time_ms : null;
    });
    return {
      label: ssg.charAt(0).toUpperCase() + ssg.slice(1),
      data,
      borderColor: meta.color,
      backgroundColor: meta.color + '20',
      tension: 0.3,
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: false,
      spanGaps: true
    };
  });

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${formatMs(ctx.raw)}`
          }
        }
      },
      scales: {
        y: {
          title: { display: true, text: 'Build Time (ms)', color: '#8b949e' },
          ticks: { color: '#8b949e' },
          grid: { color: '#21262d' }
        },
        x: {
          ticks: { color: '#8b949e' },
          grid: { color: '#21262d' }
        }
      }
    }
  });
}

/* Data Table */
function renderTable() {
  const tbody = document.querySelector('#resultsTable tbody');
  const rows = [];

  DATA.runs.forEach(run => {
    run.results.forEach(r => {
      rows.push({ run: run.date, runId: run.id, ...r });
    });
  });

  let sortCol = 'run';
  let sortAsc = false;

  function render() {
    rows.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });

    tbody.innerHTML = rows.map(r => {
      const meta = SSG_META[r.ssg] || { color: '#888' };
      return `<tr>
        <td>${r.run}</td>
        <td><span class="ssg-badge" style="background:${meta.color}"></span>${r.ssg}</td>
        <td>${r.page_count.toLocaleString()}</td>
        <td>${r.avg_time_ms.toLocaleString()}</td>
        <td>${r.min_time_ms.toLocaleString()}</td>
        <td>${r.max_time_ms.toLocaleString()}</td>
      </tr>`;
    }).join('');

    document.querySelectorAll('#resultsTable th').forEach(th => {
      const icon = th.dataset.col === sortCol ? (sortAsc ? ' \u25B2' : ' \u25BC') : '';
      th.querySelector('.sort-icon')?.remove();
      if (icon) {
        const span = document.createElement('span');
        span.className = 'sort-icon';
        span.textContent = icon;
        th.appendChild(span);
      }
    });
  }

  document.querySelectorAll('#resultsTable th').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) sortAsc = !sortAsc;
      else { sortCol = th.dataset.col; sortAsc = true; }
      render();
    });
  });

  render();
}

init();
</script>
</body>
</html>
