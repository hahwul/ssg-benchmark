# Zola Configuration for SSG Benchmark
# https://www.getzola.org/documentation/getting-started/configuration/

# The base URL of the site
base_url = "http://example.com"

# The site title
title = "SSG Benchmark Site"

# The site description
description = "Benchmark site for testing SSG performance"

# The default language
default_language = "en"

# Whether to compile Sass
compile_sass = false

# Whether to build the search index
build_search_index = false

# Whether to minify HTML
minify_html = false

# Whether to generate feeds
generate_feeds = false

# Minimal-scenario parity: no taxonomies (blog/heavy overlays enable tags).
# Note: Zola always emits sitemap.xml (not configurable) — documented deviation.
taxonomies = []

[extra]
# Custom variables can go here
author = "Benchmark"
