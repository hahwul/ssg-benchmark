# Hexo Configuration for SSG Benchmark

title: SSG Benchmark Site
subtitle: Benchmark site for testing SSG performance
description: Benchmark site for testing SSG performance
author: SSG Benchmark
language: en
timezone: UTC

# URL
url: http://example.com
root: /
permalink: :title/

# Directory
source_dir: source
public_dir: public

# Writing
new_post_name: :title.md
default_layout: post
auto_spacing: false
titlecase: false

# Minimal-scenario parity: no default category, single unpaginated index
# (theme template lists only the 10 most recent posts), one archive page
# listing all posts (the "section page" other SSGs render).
index_generator:
  path: ''
  per_page: 0
  order_by: -date

archive_generator:
  enabled: true
  per_page: 0
  yearly: false
  monthly: false
  daily: false

# Theme
theme: benchmark

# Disable unnecessary features
feed:
  enable: false
sitemap:
  enable: false
