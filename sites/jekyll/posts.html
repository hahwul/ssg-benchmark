---
layout: default
title: Posts
permalink: /posts/
---
<section class="section">
    <h1>Posts</h1>
    <ul class="posts-list">
    {% for post in site.posts %}
        <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
            <time datetime="{{ post.date | date_to_xmlschema }}">
                {{ post.date | date: "%B %d, %Y" }}
            </time>
        </li>
    {% endfor %}
    </ul>
</section>
