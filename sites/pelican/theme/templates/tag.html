{% extends "base.html" %}

{% block title %}Tag: {{ tag }} | {{ SITENAME }}{% endblock %}

{% block content %}
<section class="tag-page">
    <h1>Tag: {{ tag }}</h1>
    <ul class="posts-list">
    {% for article in articles %}
        <li><a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a></li>
    {% endfor %}
    </ul>
</section>
{% endblock %}
