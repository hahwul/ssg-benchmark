<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description }}">
  <meta name="theme-color" content="#0b0c09">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%230b0c09'/%3E%3Ccircle cx='50' cy='50' r='26' fill='%23cdf655'/%3E%3C/svg%3E">
  {{ og_all_tags }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0b0c09;
      --bg-raised: #12140e;
      --panel: rgba(255, 255, 255, 0.025);
      --panel-hover: rgba(255, 255, 255, 0.045);
      --line: rgba(255, 255, 255, 0.07);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #edefe6;
      --text-muted: #969c8f;
      --text-dim: #686e61;
      --accent: #cdf655;
      --accent-soft: rgba(205, 246, 85, 0.14);
      --accent-glow: rgba(205, 246, 85, 0.09);
      --font-ui: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      margin: 0;
      color: var(--text);
      font-family: var(--font-ui);
      line-height: 1.6;
      background:
        radial-gradient(900px 420px at 50% -160px, var(--accent-glow), transparent 70%),
        var(--bg);
      touch-action: manipulation;
    }
    .site-wrapper { max-width: 1160px; margin: 0 auto; padding: 0 20px; }
    a { color: var(--text); text-decoration: none; }
    a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

    /* Header */
    .site-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; }
    .site-logo { display: inline-flex; align-items: center; gap: 10px; font-weight: 650; font-size: 1rem; letter-spacing: -0.01em; }
    .logo-mark { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px 2px var(--accent-soft); }
    .site-header nav a {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-muted);
      border: 1px solid var(--line); border-radius: 999px; padding: 6px 14px;
      transition: color 0.15s, border-color 0.15s, background-color 0.15s, transform 0.1s;
    }
    @media (hover: hover) {
      .site-header nav a:hover { color: var(--text); border-color: var(--line-strong); background: var(--panel); }
    }
    .site-header nav a:active { transform: scale(0.96); }

    /* Page head */
    .page-head { padding: 26px 0 30px; }
    .page-head h1 { margin: 0 0 6px; font-size: 1.7rem; font-weight: 650; letter-spacing: -0.022em; line-height: 1.2; text-wrap: balance; }
    .updated { margin: 0; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); }

    /* Panels */
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 24px;
      margin-bottom: 20px;
    }
    .panel-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .kicker { display: block; font-family: var(--font-mono); font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .panel-head h2 { margin: 0; font-size: 1.15rem; font-weight: 600; letter-spacing: -0.012em; line-height: 1.3; }
    .panel-note { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); }

    /* Leaderboard */
    .leaderboard { display: flex; flex-direction: column; }
    .lb-row {
      display: grid;
      grid-template-columns: 2.2rem minmax(11rem, 15rem) 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 11px 10px;
      border-radius: var(--r-md);
      transition: background-color 0.15s;
    }
    @media (hover: hover) { .lb-row:hover { background: var(--panel-hover); } }
    .lb-row + .lb-row { border-top: 1px solid rgba(255, 255, 255, 0.04); }
    .lb-rank { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-dim); }
    .lb-row.first .lb-rank { color: var(--accent); font-weight: 600; }
    .lb-name { display: inline-flex; align-items: center; gap: 9px; font-weight: 600; font-size: 0.92rem; letter-spacing: -0.005em; min-width: 0; }
    .lb-name .dot { flex: none; width: 8px; height: 8px; border-radius: 50%; background: var(--c, #888); box-shadow: 0 0 10px color-mix(in srgb, var(--c, #888) 45%, transparent); }
    .lb-lang { font-family: var(--font-mono); font-size: 0.66rem; font-weight: 500; color: var(--text-dim); border: 1px solid var(--line); border-radius: 999px; padding: 1px 8px; white-space: nowrap; }
    .lb-badge { font-family: var(--font-mono); font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; color: #0b0c09; background: var(--accent); border-radius: 999px; padding: 2px 8px; white-space: nowrap; box-shadow: 0 0 16px var(--accent-soft); }
    .lb-track { height: 6px; border-radius: 999px; background: rgba(255, 255, 255, 0.05); overflow: hidden; }
    .lb-fill {
      display: block; height: 100%; border-radius: 999px;
      background: var(--c, #888);
      transform-origin: left center;
      animation: sweep 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .lb-time { font-family: var(--font-mono); font-size: 0.88rem; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .lb-time small { display: block; font-size: 0.64rem; font-weight: 400; color: var(--text-dim); }
    @keyframes sweep { from { transform: scaleX(0); } }

    /* Load-in */
    .panel, .page-head { animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .panel:nth-of-type(2) { animation-delay: 60ms; }
    .panel:nth-of-type(3) { animation-delay: 120ms; }
    .panel:nth-of-type(4) { animation-delay: 180ms; }
    .panel:nth-of-type(5) { animation-delay: 240ms; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } }

    /* Charts */
    .chart-wrapper { position: relative; height: 380px; }
    .bar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 440px), 1fr)); gap: 28px; }
    .bar-grid h3 { margin: 0 0 10px; font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .bar-grid .chart-wrapper { height: 280px; }

    /* Controls */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .controls button {
      font-family: var(--font-mono); font-size: 0.74rem;
      color: var(--text-muted); background: transparent;
      border: 1px solid var(--line); border-radius: 999px;
      padding: 6px 14px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background-color 0.15s, transform 0.1s;
    }
    @media (hover: hover) { .controls button:hover { color: var(--text); border-color: var(--line-strong); } }
    .controls button:active { transform: scale(0.96); }
    .controls button.active { background: var(--accent); border-color: transparent; color: #0b0c09; font-weight: 600; box-shadow: 0 0 18px var(--accent-soft); }

    /* Table */
    .table-scroll { max-height: 540px; overflow: auto; border: 1px solid var(--line); border-radius: var(--r-md); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      position: sticky; top: 0; z-index: 1;
      background: var(--bg-raised);
      font-family: var(--font-mono); font-size: 0.66rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
      padding: 12px 14px; text-align: left; cursor: pointer; user-select: none; white-space: nowrap;
      border-bottom: 1px solid var(--line);
      transition: color 0.15s;
    }
    @media (hover: hover) { thead th:hover { color: var(--text); } }
    th .sort-icon { color: var(--accent); margin-left: 2px; }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
    tbody tr:last-child td { border-bottom: none; }
    th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.num { font-family: var(--font-mono); font-size: 0.8rem; }
    td.dim { color: var(--text-dim); }
    td.mono { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-muted); }
    @media (hover: hover) { tbody tr:hover td { background: var(--panel-hover); } }
    .ssg-badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: baseline; }
    .ssg-name { font-weight: 550; text-transform: capitalize; }

    /* Footer */
    .site-footer { margin-top: 48px; padding: 22px 0 34px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); }
    .site-footer p { margin: 0; }
    .site-footer a { color: var(--text-muted); transition: color 0.15s; }
    @media (hover: hover) { .site-footer a:hover { color: var(--accent); } }

    /* 404 */
    .not-found { padding: 96px 0; text-align: center; }
    .not-found .code { font-family: var(--font-mono); font-size: 4.5rem; font-weight: 600; color: var(--accent); letter-spacing: -0.022em; line-height: 1; text-shadow: 0 0 40px var(--accent-soft); }
    .not-found p { color: var(--text-muted); }

    .site-main { min-height: calc(100vh - 220px); }

    @media (max-width: 640px) {
      .chart-wrapper { height: 300px; }
      .panel { padding: 18px 16px; }
      .lb-row { grid-template-columns: 1.6rem minmax(0, 1fr) auto; row-gap: 8px; padding: 12px 6px; }
      .lb-rank { grid-row: 1; grid-column: 1; }
      .lb-name { grid-row: 1; grid-column: 2; flex-wrap: wrap; }
      .lb-time { grid-row: 1; grid-column: 3; }
      .lb-track { grid-row: 2; grid-column: 1 / -1; }
      .lb-time small { display: inline; margin-left: 5px; }
      .lb-lang { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .panel, .page-head, .lb-fill { animation: none; }
      .controls button:active, .site-header nav a:active { transform: none; }
    }
  </style>
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ base_url }}/" class="site-logo"><span class="logo-mark"></span>{{ site.title }}</a>
      <nav>
