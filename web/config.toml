# =============================================================================
# Site Configuration
# =============================================================================

title = "SSG Benchmark"
description = "Static Site Generator Build Performance Benchmark Dashboard"
base_url = "https://hahwul.github.io/ssg-benchmark"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp", "json", "js"]

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false
