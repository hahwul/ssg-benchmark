---
layout: default
---
<article>
    <header>
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date: "%B %d, %Y" }}
        </time>
        {% if page.tags %}
        <div class="tags">
            {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </header>
    <div class="content">
        {{ content }}
    </div>
    <nav class="post-nav">
        {% if page.previous %}<a class="post-nav-prev" href="{{ page.previous.url }}">&larr; {{ page.previous.title }}</a>{% endif %}
        {% if page.next %}<a class="post-nav-next" href="{{ page.next.url }}">{{ page.next.title }} &rarr;</a>{% endif %}
    </nav>
</article>
