# Zola — heavy scenario: blog features + build-time syntax highlighting
# (syntect) on fenced code blocks.

base_url = "http://example.com"
title = "SSG Benchmark Site"
description = "Benchmark site for testing SSG performance"
default_language = "en"

compile_sass = false
build_search_index = false
minify_html = false

generate_feeds = true
feed_limit = 20

taxonomies = [
    { name = "tags" },
]

[markdown.highlighting]
theme = "github-light"

[extra]
author = "Benchmark"
