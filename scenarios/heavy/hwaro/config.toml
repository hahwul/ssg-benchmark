# =============================================================================
# Hwaro — heavy scenario: blog features (tags, pagination, feed, Tartrazine
# highlighting) + template-heavy layouts: sidebar partial on every page
# (recent posts + tag cloud), breadcrumbs, prev/next post navigation
# =============================================================================

title = "SSG Benchmark Site"
description = "Benchmark site for testing SSG performance"
base_url = "http://example.com"

[plugins]
processors = ["markdown"]

[highlight]
enabled = true
mode = "server"
theme = "github"
use_cdn = false

[search]
enabled = false

[pagination]
enabled = true
per_page = 10

[[taxonomies]]
name = "tags"
feed = false
sitemap = false

[sitemap]
enabled = false

[robots]
enabled = false

[llms]
enabled = false

[feeds]
enabled = true
type = "atom"
limit = 20
full_content = true
sections = ["posts"]

[markdown]
safe = false

[auto_includes]
enabled = false
