# Hexo — blog scenario: tag pages + pagination(10) + atom feed (limit 20).

title: SSG Benchmark Site
subtitle: Benchmark site for testing SSG performance
description: Benchmark site for testing SSG performance
author: SSG Benchmark
language: en
timezone: UTC

# URL
url: http://example.com
root: /
permalink: :title/

# Directory
source_dir: source
public_dir: public

# Writing
new_post_name: :title.md
default_layout: post
auto_spacing: false
titlecase: false

# Pagination
index_generator:
  path: ''
  per_page: 10
  order_by: -date

archive_generator:
  enabled: true
  per_page: 0
  yearly: false
  monthly: false
  daily: false

tag_generator:
  per_page: 0

# Feed (hexo-generator-feed)
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20

sitemap:
  enable: false

# Theme
theme: benchmark
